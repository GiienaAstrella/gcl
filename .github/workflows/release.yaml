name: release
on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
      packages: write
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version: 1.26
      - name: Install Changelog
        run: go install giiena.me/changelog@v0.4.0
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: true
          cache-cleanup: on-success
      - name: Restore Fabric Loom cache
        id: loom-cache
        uses: actions/cache/restore@v6
        with:
          path: .gradle/loom-cache
          key: >-
            loom-${{ runner.os }}-${{ hashFiles(
              '**/build.gradle',
              '**/build.gradle.kts',
              '**/settings.gradle',
              '**/settings.gradle.kts',
              '**/gradle.properties',
              'gradle/libs.versions.toml',
              'gradle/wrapper/gradle-wrapper.properties',
              'build-logic/**/*.gradle',
              'build-logic/**/*.gradle.kts',
              'build-logic/**/*.kt'
            ) }}
          restore-keys: |
            loom-${{ runner.os }}-
      - name: Build
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 30
          max_attempts: 5
          retry_wait_seconds: 30
          command: ./gradlew build --stacktrace
      - name: Generate release notes
        run: |
          changelog get "${{ github.ref_name }}" > RELEASE.md
          sed -i '1s/^## \[.*\] - .*/## Changelog/' RELEASE.md
      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --draft \
            --title "${{ github.ref_name }}" \
            --notes-file RELEASE.md
      - name: Upload Common artifacts
        uses: actions/upload-artifact@v7
        with:
          name: common
          path: common/build/libs/*.jar
          if-no-files-found: error
          retention-days: 14
      - name: Upload Fabric artifacts
        uses: actions/upload-artifact@v7
        with:
          name: fabric
          path: fabric/build/libs/*.jar
          if-no-files-found: error
          retention-days: 14
      - name: Upload NeoForge artifacts
        uses: actions/upload-artifact@v7
        with:
          name: neoforge
          path: neoforge/build/libs/*.jar
          if-no-files-found: error
          retention-days: 14
      - name: Publish artifacts
        env:
          local_maven_url: https://maven.pkg.github.com/${{ github.repository }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew publish --stacktrace
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ github.ref_name }}" --draft=false
      - name: Delete pre-release Common packages
        continue-on-error: true
        uses: actions/delete-package-versions@v5
        with:
          package-name: 'me.giiena.config.gcl-common'
          package-type: 'maven'
          min-versions-to-keep: 0
          ignore-versions: '^\d+\.\d+\.\d+(-\d+\.\d+)?$'
      - name: Delete pre-release Fabric packages
        continue-on-error: true
        uses: actions/delete-package-versions@v5
        with:
          package-name: 'me.giiena.config.gcl-fabric'
          package-type: 'maven'
          min-versions-to-keep: 0
          ignore-versions: '^\d+\.\d+\.\d+(-\d+\.\d+)?$'
      - name: Delete pre-release NeoForge packages
        continue-on-error: true
        uses: actions/delete-package-versions@v5
        with:
          package-name: 'me.giiena.config.gcl-neoforge'
          package-type: 'maven'
          min-versions-to-keep: 0
          ignore-versions: '^\d+\.\d+\.\d+(-\d+\.\d+)?$'